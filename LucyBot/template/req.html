<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Suhani Stream | {{ file_name }}</title>
  <link rel="icon" href="https://telegra.ph/file/5a53e66bb148003666d62.jpg" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.plyr.io/3.6.12/plyr.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #f39c12;
      --red: #e74c3c;
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #181818;
      --border: rgba(255,255,255,0.06);
      --text: #e8e8e8;
      --muted: #555;
      --radius: 18px;
      --grad: linear-gradient(135deg, #f39c12, #e74c3c);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(243,156,18,0.3); border-radius: 4px; }

    /* ── Header ── */
    .header {
      width: 100%;
      max-width: 480px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 2px;
      line-height: 1;
    }
    .logo span:first-child { color: var(--orange); }
    .logo span:last-child { color: rgba(255,255,255,0.88); }

    .header-badge {
      font-size: 10px;
      font-weight: 700;
      color: var(--orange);
      background: rgba(243,156,18,0.1);
      border: 1px solid rgba(243,156,18,0.25);
      border-radius: 20px;
      padding: 4px 10px;
      letter-spacing: 1px;
    }

    /* ── Main wrapper ── */
    .main {
      width: 100%;
      max-width: 480px;
      padding: 0 0 80px;
      animation: fadeUp 0.4s ease both;
    }

    /* ── Video Player ── */
    .player-wrap {
      width: 100%;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    .plyr {
      --plyr-color-main: #f39c12;
      --plyr-video-control-background-hover: rgba(243,156,18,0.8);
      --plyr-range-fill-background: var(--orange);
    }

    /* ── Content area ── */
    .content {
      padding: 20px 16px 0;
    }

    /* ── File title ── */
    .file-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .file-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .badge {
      font-size: 10px;
      font-weight: 800;
      padding: 3px 9px;
      border-radius: 7px;
      letter-spacing: 0.3px;
    }
    .badge-size {
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .badge-quality {
      background: #c0392b;
      color: #fff;
    }
    .badge-quality.q2160 { background: #e8b84b; color: #111; }
    .badge-quality.q1080 { background: #c0392b; }
    .badge-quality.q720  { background: #e67e22; }
    .badge-quality.q480  { background: #27ae60; }
    .badge-quality.q360  { background: #555; }

    /* ── Section label ── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      color: #3a3a3a;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }

    /* ── Player buttons row ── */
    .player-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .player-btns .btn-playit {
      grid-column: 1 / -1;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 16px;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      text-decoration: none;
      color: #fff;
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s, opacity 0.18s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }
    .btn:active { transform: scale(0.97); opacity: 0.88; }

    .btn-mx     { background: linear-gradient(135deg, #1a73e8, #0d47a1); }
    .btn-vlc    { background: linear-gradient(135deg, #e67e22, #d35400); }
    .btn-playit { background: linear-gradient(135deg, #8e44ad, #6c3483); }

    /* ── Action buttons ── */
    .action-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn-download {
      background: linear-gradient(135deg, #27ae60, #1e8449);
      box-shadow: 0 6px 20px rgba(39,174,96,0.25);
    }
    .btn-telegram {
      background: linear-gradient(135deg, #229ED9, #1a7aab);
      box-shadow: 0 6px 20px rgba(34,158,217,0.2);
    }
    .btn-share {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn svg { flex-shrink: 0; }

    /* ── File details card ── */
    .file-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .file-card-title {
      font-size: 11px;
      font-weight: 800;
      color: var(--orange);
      letter-spacing: 1px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .file-card-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .file-card-row:last-child { border-bottom: none; padding-bottom: 0; }

    .file-card-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      flex-shrink: 0;
    }
    .file-card-value {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      text-align: right;
      word-break: break-all;
      font-family: monospace;
    }

    /* ── Footer ── */
    .footer {
      width: 100%;
      max-width: 480px;
      text-align: center;
      padding: 14px 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: #2a2a2a;
      line-height: 1.7;
    }
    .footer a { color: #333; text-decoration: none; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #1e1e1e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 11px 20px;
      font-size: 13px;
      font-weight: 600;
      color: #eee;
      z-index: 9999;
      white-space: nowrap;
      opacity: 0;
      transition: all 0.25s ease;
      box-shadow: 0 8px 28px rgba(0,0,0,0.7);
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <span>SUHANI</span><span> STREAM</span>
    </div>
    <div class="header-badge">🎬 WATCH ONLINE</div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Video Player -->
    <div class="player-wrap">
      <video id="player" src="{{ file_url }}" playsinline>
        Your browser does not support the video tag.
      </video>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Title & Meta -->
      <div style="margin-bottom:18px; margin-top:16px;">
        <div class="file-title" id="fileTitle">{{ file_name }}</div>
        <div class="file-meta" id="fileMeta">
          <span class="badge badge-size">💾 {{ file_size }}</span>
        </div>
      </div>

      <!-- External Players -->
      <div class="section-label">OPEN IN APP</div>
      <div class="player-btns" style="margin-bottom:16px;">
        <button class="btn btn-mx" onclick="mx_player()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          MX Player
        </button>
        <button class="btn btn-vlc" onclick="vlc_player()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          VLC Player
        </button>
        <button class="btn btn-playit btn-playit" onclick="playit_player()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          PlayIt Player
        </button>
      </div>

      <!-- Actions -->
      <div class="section-label">ACTIONS</div>
      <div class="action-btns">
        <button class="btn btn-download" onclick="streamDownload()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Direct Download
        </button>
        <button class="btn btn-telegram" onclick="showLinkModal('{{ tg_button }}')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248-2.03 9.571c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.893.65z"/>
          </svg>
          Get File in Telegram
        </button>
        <button class="btn btn-share" onclick="shareButton()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          Share with Friends
        </button>
      </div>

      <!-- File Details -->
      <div class="section-label">FILE DETAILS</div>
      <div class="file-card">
        <div class="file-card-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          INFO
        </div>
        <div class="file-card-row">
          <span class="file-card-label">Filename</span>
          <span class="file-card-value">{{ file_name }}</span>
        </div>
        <div class="file-card-row">
          <span class="file-card-label">Size</span>
          <span class="file-card-value">{{ file_size }}</span>
        </div>
      </div>

      <!-- Disclaimer -->
      <div style="text-align:center; font-size:10px; color:#2a2a2a; line-height:1.7; margin-bottom:8px;">
        {{ disclaimer }} &nbsp;·&nbsp; <a href="{{ report_link }}" style="color:#333; text-decoration:none;">Report Issue</a>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2025 Suhani Stream · All contents publicly available on Telegram</p>
  </footer>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Scripts -->
  <script src="https://cdn.plyr.io/3.6.12/plyr.js"></script>
  <script>
    // ── Plyr init ──────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", () => {
      const player = new Plyr("#player", {
        controls: ['play-large','play','progress','current-time','mute','volume','settings','pip','airplay','fullscreen'],
        settings: ['quality','speed'],
      });
    });

    // ── Quality badge auto-detect ──────────────────────────
    (function () {
      const name = "{{ file_name }}";
      const metaEl = document.getElementById("fileMeta");
      const m = name.match(/\b(2160p|1080p|720p|480p|360p|240p)\b/i);
      if (m) {
        const q = m[1].toUpperCase();
        const cls = q.includes("2160") ? "q2160" : q.includes("1080") ? "q1080" : q.includes("720") ? "q720" : q.includes("480") ? "q480" : "q360";
        const badge = document.createElement("span");
        badge.className = `badge badge-quality ${cls}`;
        badge.textContent = q;
        metaEl.prepend(badge);
      }
    })();

    // ── External players ───────────────────────────────────
    function mx_player() {
      let c = "{{ file_url }}".replace(/^https?:\/\//, '');
      window.location.href = `intent://${c}#Intent;package=com.mxtech.videoplayer.ad;type=video/*;scheme=https;end`;
    }
    function vlc_player() {
      let c = "{{ file_url }}".replace(/^https?:\/\//, '');
      window.location.href = `intent://${c}#Intent;package=org.videolan.vlc;type=video/*;scheme=https;end`;
    }
    function playit_player() {
      let c = "{{ file_url }}".replace(/^https?:\/\//, '');
      window.location.href = `intent://${c}#Intent;package=com.playit.videoplayer;type=video/*;scheme=https;end`;
    }

    // ── Download ───────────────────────────────────────────
    function streamDownload() {
      const a = document.createElement("a");
      a.href = "{{ download_url }}";
      a.download = "{{ file_name }}";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // ── Telegram link ──────────────────────────────────────
    function showLinkModal(url) {
      if (url) window.open(url, "_blank");
    }

    // ── Share ──────────────────────────────────────────────
    function shareButton() {
      if (navigator.share) {
        navigator.share({ title: "{{ file_name }}", text: "Watch on Suhani Stream", url: window.location.href });
      } else {
        navigator.clipboard?.writeText(window.location.href)
          .then(() => showToast("✅ Link copied!"))
          .catch(() => showToast("❌ Copy failed"));
      }
    }

    // ── Toast ──────────────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2200);
    }
  </script>
</body>
</html>
